<!DOCTYPE html>
<html>
<head>
    <title>产品建议</title>
    {% include 'system/common/header.html' %}
</head>
<body class="pear-container">
<div class="layui-card">
    <div class="layui-card-body">
        <!-- 搜索区域 -->
        <div class="layui-form layui-form-pane" id="searchArea" style="margin-bottom: 10px;">
            <div class="layui-row layui-col-space10">
                <div class="layui-col-md3">
                    <div class="layui-form-item">
                        <label class="layui-form-label">建议标题</label>
                        <div class="layui-input-block">
                            <input type="text" name="searchTitle" id="searchTitle" placeholder="建议标题关键词" autocomplete="off" class="layui-input">
                        </div>
                    </div>
                </div>
                <div class="layui-col-md3">
                    <div class="layui-form-item">
                        <label class="layui-form-label">优先级</label>
                        <div class="layui-input-block">
                            <select name="searchPriority" id="searchPriority">
                                <option value="">全部</option>
                                <option value="High">高</option>
                                <option value="Medium">中</option>
                                <option value="Low">低</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="layui-col-md3">
                    <div class="layui-form-item">
                        <label class="layui-form-label">状态</label>
                        <div class="layui-input-block">
                            <select name="searchStatus" id="searchStatus">
                                <option value="">全部</option>
                                <option value="Open">创建/新建</option>
                                <option value="In Review">审核中</option>
                                <option value="Accepted">已接受</option>
                                <option value="Rejected">已拒绝</option>
                                <option value="Implemented">已实现</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="layui-col-md3">
                    <div class="layui-form-item">
                        <label class="layui-form-label">产品类型</label>
                        <div class="layui-input-block">
                            <select name="product_type_level1" id="product_type_level1" lay-search="">
                                <option value="">请选择产品类型</option>
                                <option value="双向网闸">双向网闸</option>
                                <option value="单向光闸">单向光闸</option>
                                <option value="国产网闸">国产网闸</option>
                                <option value="国产光闸">国产光闸</option>
                                <option value="防火墙">防火墙</option>
                                <option value="数据交换平台">数据交换平台</option>
                                <option value="文件交换系统（山东源鲁）">文件交换系统（山东源鲁）</option>
                                <option value="文档审计">文档审计</option>
                                <option value="端设备">端设备</option>
                                <option value="密件流转">密件流转</option>
                                <option value="真物理隔离网闸">真物理隔离网闸</option>
                                <option value="其他">其他安全设备</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
            <div class="layui-row layui-col-space10">
                <div class="layui-col-md3">
                    <div class="layui-form-item">
                        <label class="layui-form-label">创建者</label>
                        <div class="layui-input-block">
                            <input type="text" name="searchCreator" id="searchCreator" placeholder="创建者姓名" autocomplete="off" class="layui-input">
                        </div>
                    </div>
                </div>
                <div class="layui-col-md6">
                    <div class="layui-form-item">
                        <div class="layui-input-block" style="margin-left: 0; text-align: right;">
                            <button type="button" class="layui-btn layui-btn-normal" onclick="search_table()">
                                <i class="layui-icon layui-icon-search"></i>搜索
                            </button>
                            <button type="button" class="layui-btn layui-btn-primary" onclick="resetSearch()">
                                <i class="layui-icon layui-icon-refresh"></i>重置
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 数据表格 -->
        <table id="suggestionTable" lay-filter="suggestionTable"></table>
    </div>
</div>

<!-- 工具栏 -->
<script type="text/html" id="toolbar">
    <button class="layui-btn layui-btn-normal layui-btn-sm" lay-event="add">
        <i class="layui-icon layui-icon-add-1"></i>新增建议
    </button>
</script>

<!-- 操作列 -->
<script type="text/html" id="toolbarDemo">
    <a class="layui-btn layui-btn-primary layui-btn-xs" lay-event="view">查看</a>
    <a class="layui-btn layui-btn-xs" lay-event="edit">编辑</a>
    {% if authorize("system:product_suggestion:delete") %}
    <a class="layui-btn layui-btn-danger layui-btn-xs" lay-event="delete">删除</a>
    {% endif %}
</script>

<!-- 优先级模板 -->
<script type="text/html" id="priorityTpl">
    {% raw %}{{#if (d.priority === 'High') { }}{% endraw %}
    <span class="layui-badge layui-bg-red">高</span>
    {% raw %}{{# }else if(d.priority === 'Medium'){ }}{% endraw %}
    <span class="layui-badge layui-bg-orange">中</span>
    {% raw %}{{# }else if(d.priority === 'Low'){ }}{% endraw %}
    <span class="layui-badge layui-bg-green">低</span>
    {% raw %}{{# }else{ }}{% endraw %}
    <span class="layui-badge layui-bg-gray">{% raw %}{{ d.priority }}{% endraw %}</span>
    {% raw %}{{# } }}{% endraw %}
</script>

<!-- 状态模板 -->
<script type="text/html" id="statusTpl">
    {% raw %}{{#if (d.status === 'Open') { }}{% endraw %}
    <span class="layui-badge layui-bg-blue">创建/新建</span>
    {% raw %}{{# }else if(d.status === 'In Review'){ }}{% endraw %}
    <span class="layui-badge layui-bg-orange">审核中</span>
    {% raw %}{{# }else if(d.status === 'Accepted'){ }}{% endraw %}
    <span class="layui-badge layui-bg-green">已接受</span>
    {% raw %}{{# }else if(d.status === 'Rejected'){ }}{% endraw %}
    <span class="layui-badge layui-bg-red">已拒绝</span>
    {% raw %}{{# }else if(d.status === 'Implemented'){ }}{% endraw %}
    <span class="layui-badge layui-bg-purple">已实现</span>
    {% raw %}{{# }else{ }}{% endraw %}
    <span class="layui-badge layui-bg-gray">{% raw %}{{ d.status }}{% endraw %}</span>
    {% raw %}{{# } }}{% endraw %}
</script>

<script>
    layui.use(['table', 'form', 'jquery'], function () {
        let table = layui.table
        let form = layui.form
        let $ = layui.jquery

        // 初始化表格
        table.render({
            elem: '#suggestionTable',
            url: '/system/product_suggestion/table',
            toolbar: '#toolbar',
            defaultToolbar: ['filter', 'print', 'exports'],
            page: true,
            cols: [[
                {type: 'checkbox'},
                {field: 'id', title: 'ID', width: 80, sort: true},
                {field: 'title', title: '建议标题', minWidth: 200},
                {field: 'priority', title: '优先级', width: 100, templet: '#priorityTpl'},
                {field: 'status', title: '状态', width: 120, templet: '#statusTpl'},
                {field: 'creator_name', title: '创建者', width: 120},
                {field: 'product_type_level1', title: '产品类型', width: 150},
                {field: 'create_time', title: '创建时间', width: 170, sort: true},
                {field: 'update_time', title: '更新时间', width: 170, sort: true},
                {title: '操作', width: 200, align: 'center', toolbar: '#toolbarDemo', fixed: 'right'}
            ]],
            skin: 'line',
            even: true,
            page: true,
            limit: 15,
            limits: [15, 30, 50, 100]
        })

        // 监听工具条事件
        table.on('tool(suggestionTable)', function (obj) {
            let data = obj.data
            if (obj.event === 'view') {
                viewSuggestion(data.id)
            } else if (obj.event === 'edit') {
                editSuggestion(data.id)
            } else if (obj.event === 'delete') {
                deleteSuggestion(data.id, data.title)
            }
        })

        // 监听表格工具栏事件
        table.on('toolbar(suggestionTable)', function (obj) {
            if (obj.event === 'add') {
                addSuggestion()
            } else if (obj.event === 'batchRemove') {
                batchDelete()
            }
        })

        // 新增建议
        window.addSuggestion = function () {
            layer.open({
                type: 2,
                title: '新增产品建议',
                area: ['800px', '600px'],
                content: '/system/product_suggestion/add',
                end: function () {
                    table.reload('suggestionTable')
                }
            })
        }

        // 查看建议
        window.viewSuggestion = function (id) {
            layer.open({
                type: 2,
                title: '查看产品建议',
                area: ['800px', '600px'],
                content: '/system/product_suggestion/view/' + id
            })
        }

        // 编辑建议
        window.editSuggestion = function (id) {
            layer.open({
                type: 2,
                title: '编辑产品建议',
                area: ['800px', '600px'],
                content: '/system/product_suggestion/edit/' + id,
                end: function () {
                    table.reload('suggestionTable')
                }
            })
        }

        // 删除建议
        window.deleteSuggestion = function (id, title) {
            layer.confirm('确定要删除产品建议【' + title + '】吗？', {
                btn: ['确定', '取消']
            }, function () {
                $.ajax({
                    url: '/system/product_suggestion/delete',
                    type: 'POST',
                    data: { id: id },
                    success: function (res) {
                        if (res.success) {
                            layer.msg(res.msg, { icon: 1, time: 1500 }, function () {
                                table.reload('suggestionTable')
                            })
                        } else {
                            layer.msg(res.msg, { icon: 2 })
                        }
                    },
                    error: function () {
                        layer.msg('删除失败', { icon: 2 })
                    }
                })
            })
        }

        // 批量删除
        window.batchDelete = function () {
            let checkStatus = table.checkStatus('suggestionTable')
            let data = checkStatus.data

            if (data.length === 0) {
                layer.msg('请选择要删除的数据', { icon: 2 })
                return
            }

            layer.confirm('确定要删除选中的 ' + data.length + ' 条数据吗？', {
                btn: ['确定', '取消']
            }, function () {
                let ids = data.map(function (item) {
                    return item.id
                })

                $.ajax({
                    url: '/system/product_suggestion/batchDelete',
                    type: 'POST',
                    data: { 'ids[]': ids },
                    success: function (res) {
                        if (res.success) {
                            layer.msg(res.msg, { icon: 1, time: 1500 }, function () {
                                table.reload('suggestionTable')
                            })
                        } else {
                            layer.msg(res.msg, { icon: 2 })
                        }
                    },
                    error: function () {
                        layer.msg('批量删除失败', { icon: 2 })
                    }
                })
            })
        }

        // 重置搜索
        window.resetSearch = function () {
            $('#searchTitle').val('')
            $('#searchPriority').val('')
            $('#searchStatus').val('')
            $('#product_type_level1').val('')
            $('#searchCreator').val('')
            form.render('select')
            table.reload('suggestionTable', {
                where: {
                    searchTitle: '',
                    searchPriority: '',
                    searchStatus: '',
                    product_type_level1: '',
                    searchCreator: ''
                },
                page: {
                    curr: 1
                }
            })
        }

        // 搜索表格
        window.search_table = function () {
            let searchTitle = $('#searchTitle').val()
            let priority = $('#searchPriority').val()
            let status = $('#searchStatus').val()
            let product_type_level1 = $('#product_type_level1').val()
            let searchCreator = $('#searchCreator').val()

            table.reload('suggestionTable', {
                where: {
                    searchTitle: searchTitle,
                    searchPriority: priority,
                    searchStatus: status,
                    product_type_level1: product_type_level1,
                    searchCreator: searchCreator
                },
                page: {
                    curr: 1
                }
            })
        }
    })
</script>
</body>
</html>
