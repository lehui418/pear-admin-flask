<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试错误处理机制</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
</head>
<body>
    <h1>ECharts 错误处理测试</h1>
    
    <div style="margin: 20px;">
        <h2>测试1: 正常图表</h2>
        <div id="normalChart" style="width: 600px; height: 400px; border: 1px solid #ccc;"></div>
    </div>
    
    <div style="margin: 20px;">
        <h2>测试2: 错误数据（undefined series）</h2>
        <div id="errorChart1" style="width: 600px; height: 400px; border: 1px solid #ccc;"></div>
        <div id="errorChart1-loading" style="color: blue;">加载中...</div>
        <div id="errorChart1-error" style="color: red; display: none;">错误信息</div>
    </div>
    
    <div style="margin: 20px;">
        <h2>测试3: 空实例</h2>
        <div id="errorChart2" style="width: 600px; height: 400px; border: 1px solid #ccc;"></div>
        <div id="errorChart2-loading" style="color: blue;">加载中...</div>
        <div id="errorChart2-error" style="color: red; display: none;">错误信息</div>
    </div>

    <div style="margin: 20px;">
        <button onclick="runTests()">运行测试</button>
        <button onclick="clearConsole()">清空控制台</button>
    </div>

    <div id="testResults" style="margin: 20px; padding: 10px; border: 1px solid #ccc; background: #f5f5f5;">
        <h3>测试结果</h3>
        <div id="testOutput"></div>
    </div>

    <script>
        // 复制 main.html 中的 safeSetOption 函数
        function safeSetOption(chartId, option, notMerge) {
            try {
                console.log(`safeSetOption - 开始处理图表: ${chartId}`);
                
                // 检查图表配置是否存在
                if (!charts || !charts[chartId]) {
                    console.error(`safeSetOption - 图表配置不存在: ${chartId}`);
                    showChartError(chartId, `图表配置不存在: ${chartId}`);
                    return false;
                }
                
                // 检查图表实例是否存在
                if (!charts[chartId].instance) {
                    console.error(`safeSetOption - 图表实例不存在: ${chartId}`);
                    showChartError(chartId, `图表实例不存在，请检查DOM元素和初始化过程`);
                    return false;
                }
                
                // 检查实例是否有setOption方法
                if (typeof charts[chartId].instance.setOption !== 'function') {
                    console.error(`safeSetOption - 图表实例没有setOption方法: ${chartId}`);
                    showChartError(chartId, `图表实例无效，缺少setOption方法`);
                    return false;
                }
                
                // 检查option参数
                if (!option || typeof option !== 'object') {
                    console.error(`safeSetOption - option参数无效: ${chartId}`, option);
                    showChartError(chartId, `图表配置参数无效`);
                    return false;
                }
                
                // 检查series数据
                if (option.series) {
                    if (!Array.isArray(option.series)) {
                        console.error(`safeSetOption - series不是数组: ${chartId}`);
                        showChartError(chartId, `图表数据格式错误：series必须是数组`);
                        return false;
                    }
                    
                    // 检查series数组是否为空或包含无效数据
                    if (option.series.length === 0) {
                        console.warn(`safeSetOption - series数组为空: ${chartId}`);
                    }
                    
                    // 检查每个series项
                    for (let i = 0; i < option.series.length; i++) {
                        const seriesItem = option.series[i];
                        if (!seriesItem || typeof seriesItem !== 'object') {
                            console.error(`safeSetOption - series[${i}]无效: ${chartId}`, seriesItem);
                            showChartError(chartId, `图表数据错误：series[${i}]无效`);
                            return false;
                        }
                        
                        // 检查data字段
                        if (seriesItem.data !== undefined && !Array.isArray(seriesItem.data)) {
                            console.error(`safeSetOption - series[${i}].data不是数组: ${chartId}`, seriesItem.data);
                            showChartError(chartId, `图表数据错误：series[${i}].data必须是数组`);
                            return false;
                        }
                    }
                }
                
                console.log(`safeSetOption - 所有验证通过，调用setOption: ${chartId}`);
                charts[chartId].instance.setOption(option, notMerge);
                console.log(`safeSetOption - setOption调用成功: ${chartId}`);
                return true;
                
            } catch (error) {
                console.error(`safeSetOption - 调用setOption时发生错误: ${chartId}`, error);
                console.error('错误堆栈:', error.stack);
                showChartError(chartId, `图表渲染失败：${error.message}`);
                return false;
            }
        }

        // 复制 showChartError 函数
        function showChartError(chartId, message) {
            const errorElement = document.getElementById(chartId + '-error');
            const loadingElement = document.getElementById(chartId + '-loading');
            if (errorElement) {
                errorElement.textContent = message;
                errorElement.style.display = 'block';
            }
            if (loadingElement) {
                loadingElement.style.display = 'none';
            }
        }

        // 复制 hideChartLoadingAndError 函数
        function hideChartLoadingAndError(chartId) {
            const errorElement = document.getElementById(chartId + '-error');
            const loadingElement = document.getElementById(chartId + '-loading');
            if (errorElement) {
                errorElement.style.display = 'none';
            }
            if (loadingElement) {
                loadingElement.style.display = 'none';
            }
        }

        // 全局错误处理
        window.addEventListener('error', function(event) {
            console.error('全局错误捕获:');
            console.error('错误消息:', event.message);
            console.error('错误文件:', event.filename);
            console.error('错误行号:', event.lineno);
            console.error('错误列号:', event.colno);
            console.error('错误堆栈:', event.error && event.error.stack);
            
            // 检查是否是ECharts相关的错误
            if (event.message && event.message.includes('Cannot read properties of undefined')) {
                console.error('检测到ECharts相关错误 - 可能是数据格式错误或图表实例状态异常');
            }
        });

        // 图表配置
        const charts = {
            normalChart: { instance: null, loading: false, error: false },
            errorChart1: { instance: null, loading: false, error: false },
            errorChart2: { instance: null, loading: false, error: false }
        };

        function clearConsole() {
            console.clear();
            document.getElementById('testOutput').innerHTML = '';
        }

        function addTestResult(testName, success, message) {
            const output = document.getElementById('testOutput');
            const result = document.createElement('div');
            result.style.padding = '5px';
            result.style.margin = '5px 0';
            result.style.borderLeft = success ? '3px solid green' : '3px solid red';
            result.style.backgroundColor = success ? '#e8f5e8' : '#ffe8e8';
            result.innerHTML = `<strong>${testName}:</strong> ${success ? '✓ 通过' : '✗ 失败'} - ${message}`;
            output.appendChild(result);
        }

        function runTests() {
            clearConsole();
            console.log('=== 开始运行错误处理测试 ===');
            
            try {
                // 测试1: 正常图表
                console.log('\n--- 测试1: 正常图表 ---');
                charts.normalChart.instance = echarts.init(document.getElementById('normalChart'));
                
                const normalOption = {
                    title: { text: '正常图表' },
                    tooltip: {},
                    xAxis: {
                        data: ['周一', '周二', '周三', '周四', '周五']
                    },
                    yAxis: {},
                    series: [{
                        name: '销量',
                        type: 'bar',
                        data: [5, 20, 36, 10, 10]
                    }]
                };
                
                const success1 = safeSetOption('normalChart', normalOption, true);
                addTestResult('正常图表测试', success1, success1 ? '图表正常渲染' : '图表渲染失败');
                
                // 测试2: 错误数据（undefined series）
                console.log('\n--- 测试2: 错误数据（undefined series） ---');
                charts.errorChart1.instance = echarts.init(document.getElementById('errorChart1'));
                
                const errorOption1 = {
                    title: { text: '错误数据测试' },
                    tooltip: {},
                    xAxis: {
                        data: ['周一', '周二', '周三']
                    },
                    yAxis: {},
                    series: undefined // 这里是错误的
                };
                
                const success2 = safeSetOption('errorChart1', errorOption1, true);
                addTestResult('错误数据测试', !success2, success2 ? '意外成功，应该失败' : '正确捕获到错误');
                
                // 测试3: 空实例
                console.log('\n--- 测试3: 空实例 ---');
                // 不初始化实例，直接调用
                const errorOption2 = {
                    title: { text: '空实例测试' },
                    tooltip: {},
                    xAxis: {
                        data: ['周一', '周二']
                    },
                    yAxis: {},
                    series: [{
                        name: '测试',
                        type: 'line',
                        data: [1, 2]
                    }]
                };
                
                const success3 = safeSetOption('errorChart2', errorOption2, true);
                addTestResult('空实例测试', !success3, success3 ? '意外成功，应该失败' : '正确检测到空实例');
                
                // 测试4: 直接调用setOption（模拟原始错误）
                console.log('\n--- 测试4: 直接调用setOption（模拟原始错误） ---');
                try {
                    charts.errorChart2.instance.setOption(errorOption2, true);
                    addTestResult('直接setOption测试', false, '应该抛出错误但没有');
                } catch (e) {
                    addTestResult('直接setOption测试', true, `正确抛出错误: ${e.message}`);
                    console.error('直接setOption错误:', e);
                }
                
                console.log('\n=== 测试完成 ===');
                
            } catch (e) {
                console.error('测试过程中发生错误:', e);
                addTestResult('测试执行', false, `测试过程错误: ${e.message}`);
            }
        }

        // 页面加载完成后自动运行一次测试
        window.onload = function() {
            console.log('测试页面加载完成');
            // 可以选择自动运行测试
            // runTests();
        };
    </script>
</body>
</html>
