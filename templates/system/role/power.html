<!DOCTYPE html>
<html>
<head>
    <title>角色授权</title>
    {% include 'system/common/header.html' %}
</head>
<body>
<form class="layui-form" action="">
    <div class="mainBox">
        <div class="main-container">
            <div class="main-container">
                <ul id="role-power" class="dtree" data-id="0"></ul>
            </div>
        </div>
    </div>
    <div class="bottom">
        <div class="button-container">
            <button type="submit" class="layui-btn layui-btn-sm" lay-submit="" lay-filter="power-save">
                <i class="layui-icon layui-icon-ok"></i>
                提交
            </button>
            <button type="reset" class="layui-btn layui-btn-primary layui-btn-sm">
                <i class="layui-icon layui-icon-refresh"></i>
                重置
            </button>
        </div>
    </div>
</form>
{% include 'system/common/footer.html' %}
<script>
    // 角色ID，从后端传递
    var ROLE_ID = {{ id | default(0) }};
    // URL配置
    var GET_ROLE_POWER_URL = "{{ url_for('system.role.get_role_power', id=id) }}";
    var SAVE_ROLE_POWER_URL = "{{ url_for('system.role.save_role_power') }}";
</script>
<script src="{{ url_for('static', filename='js/role/role_power.js') }}"></script>
</body>
</html>
